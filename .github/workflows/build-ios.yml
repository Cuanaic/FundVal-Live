name: Build iOS IPA for TrollStore

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 获取源代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装前端依赖并打包网页
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: 添加 iOS 原生工程
        working-directory: ./frontend
        run: |
          npm install @capacitor/ios
          npx cap add ios
          npx cap sync ios

      - name: 编译无签名 iOS App 并生成 IPA
        working-directory: ./frontend/ios/App
        run: |
          # 强制禁用签名进行编译 (改为使用 .xcodeproj)
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          # 提取编译好的 .app 文件并打包成巨魔可用的 .ipa
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r FundVal-Live.ipa Payload

      - name: 上传编译好的 IPA 提供下载
        uses: actions/upload-artifact@v4
        with:
          name: FundVal-Live-TrollStore
          path: frontend/ios/App/FundVal-Live.ipa
